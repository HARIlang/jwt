<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <h1>user profile</h1>
    <table>
      <tr>
        <td>user name :</td>
        <td id="name"></td>
      </tr>
      <tr>
        <td >email:</td>
        <td id="email"></td>
      </tr>
      <tr>
        <td>age</td>
        <td id="age"></td>
      </tr>
      <tr>
        <td>role</td>
        <td id="role"></td>
      </tr>
    </table>
  </body>
  <script>
   
    const token = localStorage.getItem("token")
    
    

    function initProfile() {
      if (!token) {
        window.location = "login.html";
        return;
      }
    }
    initProfile();

    async function userProfile() {
      try {
        const base_url = "http://localhost:4500/api/user";

        const res = await axios.get(`${base_url}/userprofile/`,{

          headers:{
            Authorization:`Bearer ${token}`    // it can also send as develoer preference like haders :{token:token} but the format given in the code is http standard format maintained in all tech like , dijango and other backend services
             
          }
        });

        console.log(res.data.userProfile);
         
        document.getElementById("name").innerHTML =res?.data?.userProfile?.name;
        document.getElementById("email").innerHTML =res?.data?.userProfile?.email;
        document.getElementById("age").innerHTML =res?.data?.userProfile?.age;
        document.getElementById("role").innerHTML =res?.data?.userProfile?.role;
        
      } catch (error) {
        console.log(error?.responce);
      }
    }

    userProfile();
  </script>
</html>
